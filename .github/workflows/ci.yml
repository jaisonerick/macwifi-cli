name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
          cache: true

      - name: vet
        run: go vet ./...

      - name: build
        run: go build -o macwifi-cli .

      - name: smoke
        run: ./macwifi-cli help
